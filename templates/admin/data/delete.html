{% extends 'admin/admin_base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 border-top border-danger border-4">
            <div class="card-body p-4 text-center">
                <div class="mb-4 text-danger opacity-75">
                    <i class="fas fa-trash-alt fa-4x"></i>
                </div>

                <h3 class="fw-bold mb-3">Delete Data Value?</h3>

                <p class="lead text-muted mb-4">
                    Are you sure you want to delete this value for <strong>{{ value.indicator.name }}</strong> in
                    <strong>{{ value.district.name }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">
                            Yes, Delete Value
                        </button>
                        <a href="{% url 'admin_data_values' %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
