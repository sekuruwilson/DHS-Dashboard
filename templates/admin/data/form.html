{% extends 'admin/admin_base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h4 mb-0 fw-bold">{% if form.instance.pk %}Edit Data Value{% else %}Add Data Value{% endif %}</h2>
    <a href="{% url 'admin_data_values' %}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-2"></i> Back to List
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}

                    {% if not form.instance.pk %}
                    <!-- Custom field for Selecting Indicator first if creating new -->
                    <div class="mb-3">
                        <label for="id_indicator" class="form-label requiredField">
                            Indicator<span class="asteriskField">*</span>
                        </label>
                        <select name="indicator" class="form-select" id="id_indicator" required>
                            <option value="" selected>---------</option>
                            {% for ind in indicators %}
                            <option value="{{ ind.id }}">{{ ind.name }} ({{ ind.unit }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label class="form-label">Indicator</label>
                        <input type="text" class="form-control" value="{{ form.instance.indicator.name }}" disabled>
                    </div>
                    {% endif %}

                    {{ form|crispy }}

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'admin_data_values' %}" class="btn btn-light">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">
                            {% if form.instance.pk %}Update Value{% else %}Save Value{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
