<div class="animate-fade-in">
    <div class="d-flex align-items-center mb-3">
        <div class="bg-primary bg-opacity-10 rounded-circle p-2 me-3">
            <i class="bi bi-robot text-primary fs-5"></i>
        </div>
        <h6 class="mb-0 fw-bold">Automated Data Analysis</h6>
    </div>
    <ul class="list-group list-group-flush bg-transparent">
        {% for insight in insights %}
        <li class="list-group-item bg-transparent border-0 px-0 py-2 d-flex align-items-start">
            <i class="bi bi-patch-check-fill text-purple me-3 mt-1"></i>
            <span class="small text-muted">{{ insight|safe }}</span>
        </li>
        {% endfor %}
    </ul>
    <div class="mt-4 p-3 rounded-4 bg-light border">
        <p class="small text-muted mb-0">
            <i class="bi bi-info-circle me-2"></i>
            These insights are generated automatically based on current data distribution across selected districts.
        </p>
    </div>
</div>
